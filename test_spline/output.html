  <!-- Spline 3D Runtime -->
  <script type="module">
    import { Application } from 'https://esm.sh/@splinetool/runtime';

    const canvas = document.getElementById('spline-canvas');
    const loader = document.getElementById('spline-loader');
    const container = document.getElementById('sphere-container');

    // ── Block ONLY zoom/scroll/drag — let mousemove pass through to Spline ──
    // We block: wheel (2-finger scroll), touch gesture, pointerdown (camera drag)
    // We ALLOW: pointermove / mousemove — Spline needs these for cursor tracking

    const blockScroll = (e) => { e.preventDefault(); e.stopPropagation(); };

    // Block 2-finger trackpad scroll on the whole window when over canvas
    window.addEventListener('wheel', (e) => {
      e.preventDefault();
    }, { passive: false, capture: true });

    // Block touch & drag on canvas/container
    [canvas, container].forEach(el => {
      if (!el) return;
      el.addEventListener('wheel',      blockScroll, { passive: false, capture: true });
      el.addEventListener('touchmove',  blockScroll, { passive: false, capture: true });
      el.addEventListener('touchstart', blockScroll, { passive: false, capture: true });
      // Block camera drag (pointerdown starts a drag orbit in Spline)
      el.addEventListener('pointerdown', (e) => e.stopPropagation(), { capture: true });
    });

    const spline = new Application(canvas);

    spline.load('https://prod.spline.design/Mo5yLxqi3XmOMwGw/scene.splinecode')
      .then(() => {
        console.log('🤖 Spline robot hand loaded');
        if (loader) loader.classList.add('hidden');
        canvas.classList.add('loaded');
      })
      .catch((err) => {
        console.error('Spline load error:', err);
        if (loader) loader.classList.add('hidden');
      });
  </script>
